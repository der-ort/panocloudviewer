<!DOCTYPE html>
<!--
  Embedded iFrame Example

  Shows how to embed the PanoCloudViewer in a plain HTML page via an iframe.
  The viewer is served from a Next.js export (apps/web/out/) or any static
  hosting. Query parameters can pass the data source URL.

  This is the simplest integration path for CMS pages, WordPress, or any
  context where you can't use React directly.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embedded Point Cloud Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; }

    .page { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #999; margin-bottom: 1.5rem; font-size: 0.875rem; }

    .viewer-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Project Site Scan</h1>
    <p>Interactive 3D point cloud captured on 2024-03-15. Use orbit controls to navigate.</p>

    <div class="viewer-container">
      <!-- Replace src with your deployed viewer URL -->
      <iframe
        src="https://your-viewer-host.com/?source=https://bucket.s3.amazonaws.com/project/"
        allowfullscreen
        loading="lazy"
      ></iframe>
    </div>
  </div>
</body>
</html>
